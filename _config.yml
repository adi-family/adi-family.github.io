# GitHub Pages umbrella site for the ADI Family org.
# Custom domain is in ./CNAME (github.withadi.dev).

title: ADI Family
# jekyll-seo-tag appends tagline after the title (e.g. "ADI Family | tagline").
# Without one, it falls back to the full description here — overflows SERP titles.
tagline: open-source projects
description: >-
  Open-source projects under the ADI umbrella — schemas, surfaces, and
  developer tooling. Home of Box, a declarative DSL for schemas and
  project surfaces.
url: https://github.withadi.dev
author: ADI Family
lang: en

# Minimal Jekyll theme that ships with GitHub Pages. Picked because it
# renders Markdown without ceremony — the org page is mostly a project
# index, not a designed site.
theme: jekyll-theme-cayman

# jekyll-seo-tag (canonical/og/twitter/JSON-LD) is auto-enabled by
# GitHub Pages; listing it here keeps intent explicit.
# jekyll-sitemap generates /sitemap.xml from front-matter and links.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
